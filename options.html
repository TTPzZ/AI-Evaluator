<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Cài đặt AI</title>
  <style>
    body { font-family: "Segoe UI", "Noto Sans", Arial, sans-serif; padding: 20px; background: #f4f7f6; color: #333; }
    .container { max-width: 600px; margin: auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { color: #0056b3; border-bottom: 2px solid #e0eaf5; padding-bottom: 10px; margin-top: 0; }
    label { font-weight: bold; display: block; margin-top: 15px; font-size: 14px; }
    input[type="password"], textarea {
      padding: 10px; width: 100%; box-sizing: border-box; font-size: 14px;
      background: #f8f9fa; border: 1px solid #ccc; outline: none; border-radius: 6px; margin-top: 5px;
    }
    textarea { height: 120px; resize: vertical; }
    .btn-main {
      padding: 12px 15px; font-size: 14px; font-weight: bold; background: #28a745; color: #fff;
      border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; width: 100%; transition: 0.2s;
    }
    .btn-main:hover { background: #218838; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Cấu Hình AI Nhận Xét</h2>
    
    <label>Gemini API Key:</label>
    <input type="password" id="geminiApiKey" placeholder="Nhập API Key của Google Gemini...">
    
    <label>Mẫu Câu Lệnh (Prompt):</label>
    <div style="font-size:12px; color:#666; margin-top: 5px;">Sử dụng biến <b>{keywords}</b> để đại diện cho từ khóa bạn nhập.</div>
    <textarea id="aiPrompt" placeholder="Nhập prompt..."></textarea>
    
    <button id="saveBtn" class="btn-main">Lưu Cấu Hình</button>
  </div>
  <script src="options.js"></script>
</body>
</html>
